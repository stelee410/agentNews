# agentNews + agentVoice shared origin reverse proxy.
# TLS terminates at Cloudflare; this proxy speaks plain HTTP on :80 and routes
# by Host. Uses Docker's embedded DNS (127.0.0.11) with runtime resolution so a
# backend restart / IP change doesn't require an nginx reload. WebSocket upgrade
# and long timeouts are enabled for agentVoice's realtime streams.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;
proxy_read_timeout  3600s;
proxy_send_timeout  3600s;
proxy_buffering     off;

server {
    listen 80;
    server_name agentnews.linkyun.co;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $up_news agentnews;
    location / { proxy_pass http://$up_news:3000; }
}

server {
    listen 80;
    server_name agentvoice.linkyun.co;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $up_voice agentvoice;
    location / { proxy_pass http://$up_voice:8787; }
}

server {
    listen 80 default_server;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $up_default agentvoice;
    location / { proxy_pass http://$up_default:8787; }
}
